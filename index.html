<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AA Literature Study</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/reader.css">
    <link rel="stylesheet" href="css/annotations.css">
    <link rel="stylesheet" href="css/search.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <button id="sidebar-toggle" class="btn-icon" aria-label="Toggle sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1 class="logo">AA Study</h1>
            </div>
            <div class="header-center">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search all literature..." aria-label="Search">
                    <button id="search-btn" class="btn-icon" aria-label="Search">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="header-right">
                <button id="theme-toggle" class="btn-icon" aria-label="Toggle theme">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <button id="settings-btn" class="btn-icon" aria-label="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-container">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <nav class="sidebar-nav">
                    <!-- Books Section -->
                    <div class="nav-section">
                        <h3 class="nav-section-title">Library</h3>
                        <ul id="books-list" class="nav-list">
                            <!-- Populated by JavaScript -->
                        </ul>
                    </div>

                    <!-- Tools Section -->
                    <div class="nav-section">
                        <h3 class="nav-section-title">Tools</h3>
                        <ul class="nav-list">
                            <li>
                                <a href="#/search" class="nav-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                                    </svg>
                                    <span>Search</span>
                                </a>
                            </li>
                            <li>
                                <a href="#/index" class="nav-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="8" y1="6" x2="21" y2="6"></line>
                                        <line x1="8" y1="12" x2="21" y2="12"></line>
                                        <line x1="8" y1="18" x2="21" y2="18"></line>
                                        <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                        <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                        <line x1="3" y1="18" x2="3.01" y2="18"></line>
                                    </svg>
                                    <span>Index</span>
                                </a>
                            </li>
                            <li>
                                <a href="#/annotations" class="nav-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 20h9"></path>
                                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                                    </svg>
                                    <span>My Notes</span>
                                </a>
                            </li>
                            <li>
                                <a href="#/bookmarks" class="nav-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                                    </svg>
                                    <span>Bookmarks</span>
                                </a>
                            </li>
                            <li>
                                <a href="#/crossrefs" class="nav-item">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                                    </svg>
                                    <span>Cross References</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <!-- Reader Area -->
            <main id="reader" class="reader">
                <div id="reader-content" class="reader-content">
                    <!-- Content populated by JavaScript -->
                    <div class="welcome-screen">
                        <h2>Welcome to AA Literature Study</h2>
                        <p>Select a book from the sidebar to begin reading, or use the search to find specific content.</p>
                    </div>
                </div>

                <!-- Page Navigation -->
                <div id="page-nav" class="page-nav hidden">
                    <button id="prev-page" class="btn-nav" aria-label="Previous page">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <div class="page-info">
                        <input type="number" id="page-input" min="1" aria-label="Page number">
                        <span>of <span id="total-pages">0</span></span>
                    </div>
                    <button id="next-page" class="btn-nav" aria-label="Next page">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </main>
        </div>

        <!-- Annotation Toolbar (floating, appears on text selection) -->
        <div id="annotation-toolbar" class="annotation-toolbar hidden">
            <div class="toolbar-section">
                <span class="toolbar-label">Highlight:</span>
                <button class="color-btn" data-color="yellow" style="background: #ffeb3b;" aria-label="Yellow highlight"></button>
                <button class="color-btn" data-color="green" style="background: #a5d6a7;" aria-label="Green highlight"></button>
                <button class="color-btn" data-color="blue" style="background: #90caf9;" aria-label="Blue highlight"></button>
                <button class="color-btn" data-color="pink" style="background: #f48fb1;" aria-label="Pink highlight"></button>
                <button class="color-btn" data-color="orange" style="background: #ffcc80;" aria-label="Orange highlight"></button>
                <button class="color-btn" data-color="purple" style="background: #ce93d8;" aria-label="Purple highlight"></button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-section">
                <span class="toolbar-label">Underline:</span>
                <button class="underline-btn" data-style="solid" aria-label="Solid underline">
                    <span style="text-decoration: underline;">A</span>
                </button>
                <button class="underline-btn" data-style="dashed" aria-label="Dashed underline">
                    <span style="text-decoration: underline dashed;">A</span>
                </button>
                <button class="underline-btn" data-style="wavy" aria-label="Wavy underline">
                    <span style="text-decoration: underline wavy;">A</span>
                </button>
                <button class="underline-btn" data-style="double" aria-label="Double underline">
                    <span style="text-decoration: underline double;">A</span>
                </button>
            </div>
            <div class="toolbar-divider"></div>
            <div class="toolbar-section">
                <button class="action-btn" data-action="comment" aria-label="Add comment">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>Comment</span>
                </button>
                <button class="action-btn" data-action="question" aria-label="Add question">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span>Question</span>
                </button>
                <button class="action-btn" data-action="definition" aria-label="Add definition">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                    </svg>
                    <span>Definition</span>
                </button>
                <button class="action-btn" data-action="crossref" aria-label="Create cross-reference">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
                        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
                    </svg>
                    <span>Link</span>
                </button>
            </div>
        </div>

        <!-- Modal Container -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal" class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Modal Title</h3>
                    <button id="modal-close" class="btn-icon" aria-label="Close modal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div id="modal-body" class="modal-body">
                    <!-- Dynamic content -->
                </div>
                <div id="modal-footer" class="modal-footer">
                    <button id="modal-cancel" class="btn btn-secondary">Cancel</button>
                    <button id="modal-confirm" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>

        <!-- Search Results Panel -->
        <div id="search-panel" class="search-panel">
            <div class="search-panel-header">
                <h3>Search Results</h3>
                <button id="close-search" class="btn-icon" aria-label="Close search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="search-filters">
                <select id="search-book-filter" aria-label="Filter by book">
                    <option value="">All Books</option>
                </select>
            </div>
            <div id="search-results" class="search-results">
                <!-- Results populated by JavaScript -->
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <!-- JavaScript Modules -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
