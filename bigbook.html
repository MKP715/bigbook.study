    'f4-key-2':{type:'key',tag:'Essence',title:'The Language of the Heart',text:'"Modem-to-modem or face-to-face, A.A.\'s speak the language of the heart in all its power and simplicity." The closing line affirms that A.A.\'s essence transcends technology, culture, and time.',pts:['The "language of the heart" = authentic sharing','Power: the message transforms lives','Simplicity: one alcoholic helping another','Medium doesn\'t matter — the connection does','Echoes the Third Edition\'s "simple and personal"'],q:'What is "the language of the heart"?',a:'It is the raw, honest sharing of one alcoholic\'s experience with another. It bypasses intellect and speaks directly to the soul. When an alcoholic shares their story — the pain, the desperation, the discovery, the hope — it resonates at a level that no textbook or therapy manual can reach. This "language" is A.A.\'s most powerful tool, and it works in any medium, any language, any era.'},
  },
  'doctors-opinion':{
    'do-medical-1':{type:'medical',tag:'Hopeless',title:'A Hopeless Alcoholic',text:'"An alcoholic of a type I had come to regard as hopeless." Dr. Silkworth introduces the case of Bill W. (unnamed) — a competent businessman who had become a hopeless alcoholic by late 1934.',pts:['Chief physician at nationally prominent hospital','Specialized in alcoholism for many years','The patient was in his third treatment','Regarded as medically hopeless','This "hopeless" label is the starting point of the entire A.A. story'],q:'Why does Silkworth call this case "hopeless"?',a:'Because by every medical standard of the day, it was. Silkworth had treated thousands of alcoholics and knew the prognosis. By labeling Bill hopeless, he establishes the baseline: what follows — recovery — should have been impossible. This makes the eventual solution all the more remarkable.'},
    'do-solution-1':{type:'solution',tag:'Solution',title:'The Idea Takes Root',text:'"He acquired certain ideas concerning a possible means of recovery...commenced to present his conceptions to other alcoholics, impressing upon them that they must do likewise with still others." The core A.A. mechanism in embryo.',pts:['Ideas acquired during third treatment','Immediately shared with other alcoholics','Must-do-likewise principle: each must carry the message','This became the basis of a growing fellowship','Over one hundred appear to have recovered'],q:'Why must each person "do likewise with still others"?',a:'Because carrying the message is not optional generosity — it is essential to the carrier\'s own recovery. The act of sharing the solution with another alcoholic reinforces the spiritual change in the one sharing. This pass-it-on principle is what makes A.A. self-replicating and what keeps individual members sober.',crossRef:'See: Working With Others (p. 89)'},
    'do-endorsement-2':{type:'endorsement',tag:'Clinical',title:'Personal Clinical Testimony',text:'"I personally know scores of cases who were of the type with whom other methods had failed completely." Silkworth stakes his clinical reputation — he has seen these transformations firsthand, in patients no other method could reach.',pts:['Direct first-person clinical observation','Scores = dozens of verified cases','All had failed every other method completely','A physician\'s professional reputation on the line']},
    'do-medical-10':{type:'medical',tag:'Epoch',title:'A New Epoch in Alcoholism',text:'"These facts appear to be of extreme medical importance...they may mark a new epoch in the annals of alcoholism." Silkworth declares this approach may be the most significant development in the history of alcoholism treatment.',pts:['"Extreme medical importance" — highest possible endorsement','May mark "a new epoch" — a turning point in history','"Extraordinary possibilities of rapid growth"','"A remedy for thousands of such situations"']},
    'do-endorsement-1':{type:'endorsement',tag:'Trust',title:'"Rely Absolutely"',text:'"You may rely absolutely on anything they say about themselves." Silkworth stakes his professional reputation on the honesty of recovering alcoholics — revolutionary in 1939.',pts:['A physician vouching for alcoholics was radical','Alcoholics were universally seen as liars','Professional reputation on the line','Gives credibility to every personal story in the book'],q:'Why is this endorsement so significant?',a:'In 1939, no one trusted an alcoholic\'s word. For a respected physician to say "rely absolutely" gave readers permission to trust the stories that follow and to trust the alcoholic in their life who might be trying to get sober.'},
    'do-medical-2':{type:'medical',tag:'Dual Nature',title:'Body as Abnormal as Mind',text:'"The body of the alcoholic is quite as abnormal as his mind." The dual nature of alcoholism — physical AND mental — challenging the prevailing view that it was purely a willpower problem.',pts:['Not just maladjustment to life','Not just flight from reality','Not just mental deficiency','These were true "to some extent"','But the physical factor cannot be left out'],q:'Why is the physical component so important?',a:'If alcoholism were purely mental, willpower should fix it. The physical component — the allergy — explains why willpower fails. Once an alcoholic takes a drink, the body creates a craving that overrides all mental resolve. This is why "just one drink" is never just one for the alcoholic.'},
    'do-medical-3':{type:'medical',tag:'Allergy',title:'The Allergy Theory',text:'"The doctor\'s theory that we have an allergy to alcohol interests us." The allergy framework explains why alcoholics cannot drink safely — ever. As ex-problem drinkers, they confirm it makes good sense.',pts:['Allergy = abnormal physical reaction to alcohol','Normal drinkers do not experience craving','The theory removes moral blame','It explains things they could not otherwise account for','Not strictly immunological but practically powerful'],q:'Is alcoholism literally an allergy?',a:'Not in the strict immunological sense, but the metaphor is practically powerful. The alcoholic\'s body reacts differently to alcohol, creating a craving absent in normal drinkers. Whether called allergy, genetic predisposition, or neurochemical sensitivity, the practical reality is the same: one drink is never safe.'},
    'do-medical-4':{type:'medical',tag:'Hospital',title:'Clear the Brain First',text:'"We favor hospitalization for the alcoholic who is very jittery or befogged. More often than not, it is imperative that a man\'s brain be cleared before he is approached."',pts:['Physical detox before spiritual work','The brain must be clear to receive the message','Practical medical advice within a spiritual program','Acknowledges the physical reality of withdrawal','Bridges medical treatment and spiritual recovery'],q:'Why is medical detox important?',a:'A person in acute withdrawal cannot think clearly enough to grasp spiritual concepts. The brain must function before the message can be received. This practical wisdom — clear the body first, then approach the mind and spirit — reflects the integration of medical and spiritual approaches.'},
    'do-psychological-1':{type:'psychological',tag:'Psychology',title:'Moral Psychology',text:'"Some form of moral psychology was of urgent importance to alcoholics, but its application presented difficulties beyond our conception." Doctors knew spiritual help was needed but could not deliver it.',pts:['Doctors recognized the need for moral/spiritual help','Could not figure out how to apply it','Scientific approach alone was inadequate','"Powers of good outside our synthetic knowledge"','This gap is exactly what A.A. filled'],q:'What is "moral psychology"?',a:'The spiritual and ethical transformation Silkworth knew was necessary but could not prescribe as a physician. Doctors could detox the body but could not produce the inner change needed for lasting sobriety. A.A. provided the missing method.'},
    'do-historical-1':{type:'historical',tag:'Bill W.',title:'Bill at Towns Hospital',text:'"One of the leading contributors to this book came under our care in this hospital and while here he acquired some ideas which he put into practical application at once." Silkworth\'s account of Bill W.\'s treatment.',pts:['Bill W. treated at Towns Hospital','Silkworth was his physician','Acquired ideas he applied immediately','Later asked to share with other patients','Results were "most interesting; many are amazing"'],q:'Why is Bill not named?',a:'Consistent with A.A.\'s anonymity principle. Even the co-founder is described only as "one of the leading contributors." Principles before personalities — the ideas matter more than the person who had them.'},
    'do-key-1':{type:'key',tag:'Character',title:'Unselfishness and Community Spirit',text:'"The unselfishness of these men as we have come to know them, the entire absence of profit motive, and their community spirit, is indeed inspiring to one who has labored long and wearily in this alcoholic field."',pts:['Unselfishness: opposite of the alcoholic\'s default','No profit motive: service freely given','Community spirit: genuine fellowship','Inspiring to a veteran of the field','Evidence of real internal transformation'],q:'Why does Silkworth emphasize these qualities?',a:'Because they represent the psychic change he describes later. Alcoholics are characteristically selfish. When a doctor who treated thousands observes genuine unselfishness, he is witnessing evidence of the transformation the book promises.'},
    'do-spiritual-1':{type:'spiritual',tag:'Power',title:'Power from the Gates of Death',text:'"They believe in themselves, and still more in the Power which pulls chronic alcoholics back from the gates of death." A physician acknowledges a Power beyond medicine.',pts:['A medical doctor referencing spiritual power','Not religious language — simply "the Power"','Life-or-death stakes: "gates of death"','Self-belief secondary to belief in the Power','Medicine alone could not produce these results'],q:'Why does a doctor reference a higher Power?',a:'Because Silkworth was honest enough to admit medicine\'s limits. He had watched most patients die. When he saw people recovering through a power beyond science, his integrity compelled him to acknowledge it — not religious advocacy, but clinical observation.'},
    'do-medical-5':{type:'medical',tag:'Craving',title:'The Phenomenon of Craving',text:'"The action of alcohol on these chronic alcoholics is a manifestation of an allergy; that the phenomenon of craving is limited to this class and never occurs in the average temperate drinker."',pts:['Allergy: abnormal bodily reaction','Craving: overwhelming desire after the first drink','Limited to alcoholics — normal drinkers unaffected','Never safe to use alcohol "in any form at all"','Once the habit forms, problems pile up "astonishingly"'],q:'What is the "phenomenon of craving"?',a:'The physical compulsion that occurs AFTER an alcoholic takes the first drink. Normal drinkers can have one or two and stop. The alcoholic\'s body triggers a craving that overrides all rational thought. The problem is not stopping — it is starting.'},
    'do-key-2':{type:'key',tag:'Thesis',title:'Depth, Weight, and Higher Power',text:'"Frothy emotional appeal seldom suffices. The message which can interest and hold these alcoholic people must have depth and weight. In nearly all cases, their ideals must be grounded in a power greater than themselves, if they are to re-create their lives."',pts:['Surface motivation fails alcoholics','The message needs substance — depth and weight','A power greater than self is essential','This is the thesis of the entire Big Book','Re-creation of life, not mere behavior change'],q:'Why does frothy emotional appeal fail?',a:'Alcoholism is not a motivation problem. Thousands of sincere promises have been broken. The solution must reach deeper — to a fundamental reorientation grounded in something greater than willpower. This sentence is arguably the thesis statement of the entire Big Book.',stepRef:'Steps 2, 3, 11'},
    'do-emotional-1':{type:'emotional',tag:'Compassion',title:'The Firing Line',text:'"Let them stand with us a while on the firing line, see the tragedies, the despairing wives, the little children." Silkworth challenges skeptics to witness the devastation of alcoholism firsthand.',pts:['Directed at skeptical psychiatrists','The "firing line" = daily reality of treating alcoholics','Tragedies, despairing wives, little children','Silkworth endorses the "altruistic movement" among members','Even cynics would understand if they witnessed it'],q:'Why does Silkworth become so passionate?',a:'He had spent years watching people die. This is not academic — it is personal. His passion reveals why he embraced A.A. despite its unconventional approach: nothing else was working, and people were dying.'},
    'do-psychological-2':{type:'psychological',tag:'Delusion',title:'The Alcoholic Delusion',text:'"The sensation is so elusive that, while they admit it is injurious, they cannot after a time differentiate the true from the false. To them, their alcoholic life seems the only normal one." Reality itself becomes distorted by the disease.',pts:['Drinking begins for the effect — pleasure or relief','Over time, the alcoholic cannot distinguish true from false','The alcoholic life becomes their "normal"','This is clinical delusion, not moral failure','Explains why rational argument fails'],q:'What does "differentiate the true from the false" mean?',a:'The alcoholic\'s judgment becomes so warped that the drinking life — with all its chaos and pain — feels normal, while sobriety feels abnormal and threatening. They cannot see their situation clearly. This is why telling an alcoholic to "just stop" is futile: they literally cannot perceive reality accurately while in the grip of the illness.'},
    'do-medical-6':{type:'medical',tag:'R.I.D.',title:'Restless, Irritable, and Discontented',text:'"They are restless, irritable and discontented, unless they can again experience the sense of ease and comfort which comes at once by taking a few drinks." The baseline emotional state of the untreated alcoholic.',pts:['Restless: unable to be still or at peace','Irritable: easily agitated by life','Discontented: never satisfied','Alcohol provides temporary ease and comfort','This cycle repeats endlessly without spiritual change'],q:'Why is "restless, irritable and discontented" so important?',a:'It describes the emotional state that precedes every relapse. The alcoholic is driven to drink by intolerable inner distress. The spiritual program addresses this underlying condition. Without it, drinking remains the only relief they know.'},
    'do-medical-7':{type:'medical',tag:'Psychic Change',title:'The Essential Psychic Change',text:'"Unless this person can experience an entire psychic change there is very little hope of his recovery." The absolute medical necessity of fundamental transformation.',pts:['Psychic change = complete mental/spiritual transformation','Without it, "very little hope"','Not gradual improvement — an "entire" change','This is what Steps 1-12 produce','Echoed in Appendix II: Spiritual Experience'],q:'What is a "psychic change"?',a:'A complete rearrangement of thinking, attitudes, and relationship with the world — not behavior modification. The Twelve Steps are the method for producing this change. Without it, the alcoholic remains trapped in the cycle of craving, drinking, remorse, and resolution.',crossRef:'See: Appendix II — Spiritual Experience (p. 567)'},
    'do-key-3':{type:'key',tag:'Paradox',title:'The Paradox of Control',text:'"Once a psychic change has occurred, the very same person who seemed doomed...suddenly finds himself easily able to control his desire for alcohol, the only effort necessary being that required to follow a few simple rules."',pts:['The doomed person becomes free','Control from psychic change, not willpower','Unsolvable problems resolve themselves','The "few simple rules" are the Twelve Steps','Surrender produces control — the central paradox'],q:'What are the "few simple rules"?',a:'The Twelve Steps. After the psychic change, sobriety is not white-knuckled. By working the spiritual program — inventory, amends, prayer, service — the desire for alcohol lifts. The effort is in working the program, not fighting the craving.'},
    'do-emotional-2':{type:'emotional',tag:'Desperation',title:'The Alcoholic\'s Desperate Plea',text:'"Doctor, I cannot go on like this! I have everything to live for! I must stop, but I cannot! You must help me!" The raw voice of alcoholic desperation — sincere, despairing, and helpless.',pts:['"I cannot go on" — life has become unbearable','"I have everything to live for" — external success doesn\'t prevent it','"I must stop, but I cannot" — willpower completely defeated','"You must help me" — the beginning of surrender','Sincerity is not the issue — ability is'],q:'Why is "I must stop, but I cannot" so powerful?',a:'Six words that capture the entire disease. The alcoholic is sincere, has reasons to live, has willpower — and none of it matters. This is the moment where the myth of self-control dies. It also marks the beginning of surrender: "you must help me" admits the alcoholic cannot do it alone.'},
    'do-spiritual-2':{type:'spiritual',tag:'Beyond Medicine',title:'More Than Human Power',text:'"One feels that something more than human power is needed to produce the essential psychic change." A physician — trained in science — concludes that the solution lies beyond medicine.',pts:['A scientific mind concedes science\'s limits','"More than human power" — not less','Clinical observation, not religious advocacy','The "essential psychic change" requires spiritual help','Bridges the medical and spiritual approaches'],q:'Why is this admission significant coming from a doctor?',a:'It removes the last barrier to the spiritual solution. If even the physician admits medicine alone cannot produce the needed change, the alcoholic has permission to seek help beyond the clinical. Silkworth is not prescribing religion — he is reporting what he has observed: the cases that recover have experienced something beyond what medicine can explain.',crossRef:'See: Appendix II — Spiritual Experience (p. 567)'},
    'do-medical-8':{type:'medical',tag:'Control',title:'Beyond Mental Control',text:'"These men were not drinking to escape; they were drinking to overcome a craving beyond their mental control." Destroys the myth that alcoholics drink for pleasure or escape.',pts:['Not drinking for pleasure or escape','Driven by physical craving','Craving is BEYOND mental control','Willpower irrelevant once craving starts','This is why moral exhortation fails'],q:'Why is this distinction critical?',a:'It removes the last excuse for blaming the alcoholic. If driven by a physical craving beyond mental control, blaming them is like blaming someone for a seizure. This understanding is the foundation of compassion — both toward and from the alcoholic.'},
    'do-warning-1':{type:'warning',tag:'Fatal',title:'The Supreme Sacrifice',text:'"There are many situations which arise out of the phenomenon of craving which cause men to make the supreme sacrifice rather than continue to fight." Silkworth acknowledges that alcoholism kills — the fight itself becomes unbearable.',pts:['"Supreme sacrifice" = death, often by suicide','Driven by the phenomenon of craving','The fight itself becomes unbearable','Alcoholism is a fatal illness','Underscores the urgency of finding a solution'],q:'Why is this passage so important?',a:'It establishes alcoholism as a fatal illness, not just a bad habit. People die from this disease — not only from physical complications but from the psychological torment of uncontrollable craving. This is why the program is a matter of life and death, not lifestyle improvement.'},
    'do-duality-1':{type:'duality',tag:'Types',title:'Classification of Alcoholics',text:'Silkworth identifies several types: the emotionally unstable "psychopath" (always going on the wagon), the one who won\'t admit he can\'t drink, the time-tester, the manic-depressive, and those "entirely normal in every respect except in the effect alcohol has upon them."',pts:['The emotionally unstable — over-remorseful, many resolutions, never a decision','The denier — plans various ways to drink, changes brands/environments','The time-tester — believes periods of sobriety make it safe','The manic-depressive — least understood, could fill a chapter','The "normal" alcoholic — able, intelligent, friendly'],q:'Why is identifying different types important for recovery?',a:'Because each type has different barriers to seeking help. The "normal" type can\'t believe they\'re alcoholic. The denier keeps trying new strategies. The time-tester convinces himself each time will be different. Yet all share the same underlying condition — the phenomenon of craving. Recognizing your own type is the first step toward honest self-assessment.'},
    'do-key-5':{type:'key',tag:'Normal Alcoholic',title:'Entirely Normal Except for Alcohol',text:'"Then there are types entirely normal in every respect except in the effect alcohol has upon them. They are often able, intelligent, friendly people." Alcoholism is not a character defect.',pts:['Normal in every respect — except with alcohol','Able, intelligent, friendly','Alcoholism exists independently of character','Destroys the "weak character" myth','This type often has the hardest time seeking help'],q:'Why do "normal" alcoholics struggle most to get help?',a:'Because everything else in their life works. They have careers, families, friendships. The idea that they are alcoholic threatens their entire self-image. "I can\'t be an alcoholic — look at my life." Their very competence becomes a barrier to seeking help.'},
    'do-medical-9':{type:'medical',tag:'Unity',title:'One Symptom in Common',text:'"All these, and many others, have one symptom in common: they cannot start drinking without developing the phenomenon of craving...an allergy which differentiates these people, and sets them apart as a distinct entity."',pts:['All types of alcoholics share this symptom','Phenomenon of craving is the common thread','Differentiates them from normal drinkers','A "distinct entity" — a separate class','No treatment has permanently eradicated it','Only relief: entire abstinence'],q:'Why "entire abstinence"?',a:'If the first drink triggers an uncontrollable craving, the only solution is never taking that first drink. The alcoholic can never drink safely — not from moral weakness, but from a physical reaction that cannot be eliminated.'},
    'do-progression-1':{type:'progression',tag:'Decline',title:'End-Stage Alcoholism',text:'"A man was brought in to be treated for chronic alcoholism. He had but partially recovered from a gastric hemorrhage and seemed to be a case of pathological mental deterioration." The end stage of the disease — physical devastation and utter hopelessness.',pts:['Gastric hemorrhage: internal bleeding from alcohol damage','Appeared to have permanent brain damage','Lost everything worthwhile in life','Lived only to drink — existential despair','Frankly believed there was no hope','After detox: no permanent brain injury found'],q:'What does this case reveal about the progression of alcoholism?',a:'It shows the complete trajectory: from capable person to physical wreck with apparent brain damage who lives only to drink. Yet beneath the devastation, the person remains — the brain injury was not permanent. The disease took everything, but recovery was still possible.'},
    'do-recovery-1':{type:'recovery',tag:'Transformation',title:'A Complete Transformation',text:'After accepting the plan in the book, this desperate case returned one year later. Silkworth could not recognize him — "From a trembling, despairing, nervous wreck, had emerged a man brimming over with self-reliance and contentment."',pts:['Accepted the plan outlined in this book','One year later: called to see the doctor','Silkworth recognized the name but not the person','From despair to self-reliance and contentment','The doctor felt he was meeting a stranger','A long time passed with no return to alcohol'],q:'What does this transformation prove?',a:'Clinical evidence for the "psychic change." A physician who treated thousands could not recognize his former patient. The change was not behavioral (stopped drinking) but fundamental (entirely different person). This is what the Twelve Steps produce — not mere sobriety, but complete transformation.'},
    'do-recovery-2':{type:'recovery',tag:'Case Study',title:'From a Barn to Freedom',text:'A man who diagnosed himself hopeless hid in a deserted barn to die. Rescued and treated, he demanded assurance of future "will power." Instead, he became "sold on the ideas contained in this book" and never drank again.',pts:['Self-diagnosed as hopeless','Hid in a barn determined to die','Rescued by a searching party','Demanded "will power" — the wrong question','Told only "moral psychology" might help','Became sold on the book\'s ideas','Now "a fine specimen of manhood"'],q:'What does this case illustrate?',a:'That even the most extreme cases can recover. His demand for "will power" was the wrong question — he needed a psychic change, not more willpower. When he found it through the book\'s ideas, the willpower question became irrelevant.'},
    'do-key-4':{type:'key',tag:'Closing',title:'From Scoff to Prayer',text:'"I earnestly advise every alcoholic to read this book through, and though perhaps he came to scoff, he may remain to pray." Silkworth\'s closing — acknowledging skepticism while promising transformation.',pts:['A medical doctor recommending a spiritual book','Acknowledges the reader may be skeptical','The book itself can change the reader','Scoffing to praying = the psychic change in miniature','His final word: read it ALL the way through'],q:'Why end with this?',a:'It captures the journey from skepticism to faith the Big Book produces. Many alcoholics arrive cynical and resistant. The book meets them there and leads them to spiritual awakening. Silkworth\'s closing is both invitation and prophecy.'},
  },
};

C['preface']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xi</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider">Preface</h2><p class="mb-2"><span class="ann ann-historical" data-id="p-hist-1" onclick="showAnn(this)">THIS IS the fourth edition of the book "Alcoholics Anonymous."</span> <span class="ann ann-historical" data-id="p-hist-1" onclick="showAnn(this)">The first edition appeared in April 1939</span>, and in the following sixteen years, <span class="ann ann-historical" data-id="p-hist-2" onclick="showAnn(this)">more than 300,000 copies went into circulation.</span> <span class="ann ann-historical" data-id="p-hist-2" onclick="showAnn(this)">The second edition, published in 1955, reached a total of more than 1,150,500 copies.</span> <span class="ann ann-historical" data-id="p-hist-2" onclick="showAnn(this)">The third edition, which came off press in 1976, achieved a circulation of approximately 19,550,000 in all formats.</span></p><p class="mb-2">Because <span class="ann ann-fellowship" data-id="p-fellowship-1" onclick="showAnn(this)">this book has become the basic text for our Society</span> and <span class="ann ann-recovery" data-id="p-recovery-1" onclick="showAnn(this)">has helped such large numbers of alcoholic men and women to recovery,</span> <span class="ann ann-key" data-id="p-key-1" onclick="showAnn(this)">there exists strong sentiment against any radical changes being made in it. Therefore, the first portion of this volume, describing the A.A. recovery program, has been left largely untouched</span> in the course of revisions made for the second, third, and fourth editions. The section called <span class="ann ann-medical" data-id="p-medical-1" onclick="showAnn(this)">"The Doctor's Opinion" has been kept intact, just as it was originally written in 1939 by the late Dr. William D. Silkworth, our Society's great medical benefactor.</span></p><p class="mb-2"><span class="ann ann-historical" data-id="p-hist-3" onclick="showAnn(this)">The second edition added the appendices, the Twelve Traditions, and the directions for getting in touch with A.A.</span> But the chief change was in the section of personal stories, which was expanded to reflect the Fellowship's growth. <span class="ann ann-historical" data-id="p-hist-4" onclick="showAnn(this)">"Bill's Story," "Doctor Bob's Nightmare," and one other personal history from the first edition were retained intact;</span> three were edited and one of these was retitled; new versions of two stories were written, with new titles; thirty completely new stories were added; and <span class="ann ann-literary" data-id="p-literary-1" onclick="showAnn(this)">the story section was divided into three parts</span>, under the same headings that are used now.</p><p class="mb-2">In the third edition, <span class="ann ann-literary" data-id="p-literary-1" onclick="showAnn(this)">Part I ("Pioneers of A.A.")</span> was left unchanged. Nine of the stories in Part II ("They Stopped in Time") were carried over from the second edition; eight new stories were added. In <span class="ann ann-literary" data-id="p-literary-1" onclick="showAnn(this)">Part III ("They Lost Nearly All")</span>, eight stories were retained; five new ones were added.</p><p class="mb-2"><span class="ann ann-crossref" data-id="p-crossref-1" onclick="showAnn(this)">This fourth edition includes the Twelve Concepts for World Service</span> and revises the three sections of personal stories as follows. One new story has been added to Part I, and two that originally appeared in Part III have been repositioned there; six stories have been deleted. Six of the stories in Part II have been carried over, eleven new ones have been added, and eleven taken out. Part III now includes twelve new stories; eight were removed (in addition to the two that were transferred to Part I).</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xii</div><p class="mb-2"><span class="ann ann-key" data-id="p-key-2" onclick="showAnn(this)">All changes made over the years in</span> <span class="ann ann-foreshadow" data-id="p-foreshadow-1" onclick="showAnn(this)">the Big Book (A.A. members' fond nickname for this volume)</span> <span class="ann ann-key" data-id="p-key-2" onclick="showAnn(this)">have had the same purpose: to represent the current membership of Alcoholics Anonymous more accurately, and thereby to reach more alcoholics.</span> <span class="ann ann-solution" data-id="p-solution-1" onclick="showAnn(this)">If you have a drinking problem, we hope that you may pause in reading one of the forty-two personal stories and think: "Yes, that happened to me"; or, more important, "Yes, I've felt like that"; or, most important, "Yes, I believe this program can work for me too."</span></p>`;

C['foreword-1st']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xiii</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-0.5 uppercase tracking-wider">Foreword to First Edition</h2><p class="text-2xs text-center text-gray-500 dark:text-gray-400 italic mb-3">This is the Foreword as it appeared in the first printing of the first edition in 1939.</p><p class="mb-2"><span class="ann ann-fellowship" data-id="f1-fellowship-1" onclick="showAnn(this)">WE, OF Alcoholics Anonymous, are more than one hundred men and women who have recovered</span> from <span class="ann ann-medical" data-id="f1-medical-1" onclick="showAnn(this)">a seemingly hopeless state of mind and body.</span> <span class="ann ann-key" data-id="f1-key-1" onclick="showAnn(this)">To show other alcoholics precisely how we have recovered is the main purpose of this book.</span> <span class="ann ann-literary" data-id="f1-literary-1" onclick="showAnn(this)">For them, we hope these pages will prove so convincing that no further authentication will be necessary.</span> We think this account of our experiences will help everyone to <span class="ann ann-key" data-id="f1-key-2" onclick="showAnn(this)">better understand the alcoholic. Many do not comprehend that the alcoholic is a very sick person.</span> And besides, <span class="ann ann-solution" data-id="f1-solution-1" onclick="showAnn(this)">we are sure that our way of living has its advantages for all.</span></p><p class="mb-2"><span class="ann ann-tradition" data-id="f1-tradition-1" onclick="showAnn(this)">It is important that we remain anonymous because we are too few, at present to handle the overwhelming number of personal appeals which may result from this publication.</span> <span class="ann ann-historical" data-id="f1-hist-1" onclick="showAnn(this)">Being mostly business or professional folk, we could not well carry on our occupations in such an event.</span> <span class="ann ann-key" data-id="f1-key-3" onclick="showAnn(this)">We would like it understood that our alcoholic work is an avocation.</span></p><p class="mb-2"><span class="ann ann-tradition" data-id="f1-tradition-1" onclick="showAnn(this)">When writing or speaking publicly about alcoholism, we urge each of our Fellowship to omit his personal name, designating himself instead as "a member of Alcoholics Anonymous."</span></p><p class="mb-2"><span class="ann ann-foreshadow" data-id="f1-foreshadow-1" onclick="showAnn(this)">Very earnestly we ask the press also, to observe this request, for otherwise we shall be greatly handicapped.</span></p><p class="mb-2"><span class="ann ann-fellowship" data-id="f1-fellowship-2" onclick="showAnn(this)">We are not an organization in the conventional sense of the word.</span> <span class="ann ann-tradition" data-id="f1-tradition-2" onclick="showAnn(this)">There are no fees or dues whatsoever. The only requirement for membership is an honest desire to stop drinking.</span> <span class="ann ann-tradition" data-id="f1-tradition-3" onclick="showAnn(this)">We are not allied with any particular faith, sect or denomination, nor do we oppose anyone.</span> <span class="ann ann-service" data-id="f1-service-1" onclick="showAnn(this)">We simply wish to be helpful to those who are afflicted.</span></p><p class="mb-2"><span class="ann ann-service" data-id="f1-service-2" onclick="showAnn(this)">We shall be interested to hear from those who are getting results from this book, particularly from those who have commenced work with other alcoholics. We should like to be helpful to such cases.</span></p><p class="mb-2"><span class="ann ann-fellowship" data-id="f1-fellowship-3" onclick="showAnn(this)">Inquiry by scientific, medical, and religious societies will be welcomed.</span></p><p class="text-right font-semibold text-2xs text-gray-500 dark:text-gray-400 mt-3 italic">ALCOHOLICS ANONYMOUS</p>`;

C['foreword-2nd']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xv</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-0.5 uppercase tracking-wider">Foreword to Second Edition</h2><p class="text-2xs text-center text-gray-500 dark:text-gray-400 italic mb-3">Figures given in this foreword describe the Fellowship as it was in 1955.</p><p class="mb-2"><span class="ann ann-key" data-id="f2-key-1" onclick="showAnn(this)">SINCE the original Foreword to this book was written in 1939, a wholesale miracle has taken place.</span> <span class="ann ann-historical" data-id="f2-hist-1" onclick="showAnn(this)">Our earliest printing voiced the hope "that every alcoholic who journeys will find the Fellowship of Alcoholics Anonymous at his destination. Already," continues the early text "twos and threes and fives of us have sprung up in other communities."</span></p><p class="mb-2"><span class="ann ann-progression" data-id="f2-progression-1" onclick="showAnn(this)">Sixteen years have elapsed between our first printing of this book and the presentation in 1955 of our second edition. In that brief space, Alcoholics Anonymous has mushroomed into nearly 6,000 groups whose membership is far above 150,000 recovered alcoholics.</span> <span class="ann ann-historical" data-id="f2-hist-2" onclick="showAnn(this)">Groups are to be found in each of the United States and all of the provinces of Canada. A.A. has flourishing communities in the British Isles, the Scandinavian countries, South Africa, South America, Mexico, Alaska, Australia and Hawaii. All told, promising beginnings have been made in some 50 foreign countries and U. S. possessions. Some are just now taking shape in Asia.</span> Many of our friends encourage us by saying that this is but a beginning, only the augury of a much larger future ahead.</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xvi</div><p class="mb-2"><span class="ann ann-historical" data-id="f2-hist-3" onclick="showAnn(this)">The spark that was to flare into the first A.A. group was struck at Akron, Ohio, in June 1935, during a talk between a New York stockbroker and an Akron physician.</span> Six months earlier, <span class="ann ann-spiritual" data-id="f2-spiritual-3" onclick="showAnn(this)">the broker had been relieved of his drink obsession by a sudden spiritual experience,</span> following a meeting with an alcoholic friend who had been in contact with <span class="ann ann-spiritual" data-id="f2-spiritual-1" onclick="showAnn(this)">the Oxford Groups of that day.</span> He had also been greatly helped by <span class="ann ann-medical" data-id="f2-medical-1" onclick="showAnn(this)">the late Dr. William D. Silkworth, a New York specialist in alcoholism who is now accounted no less than a medical saint by A.A. members, and whose story of the early days of our Society appears in the next pages.</span> From this doctor, the broker had learned the grave nature of alcoholism. Though he could not accept all the tenets of the Oxford Groups, <span class="ann ann-step" data-id="f2-step-1" onclick="showAnn(this)">he was convinced of the need for moral inventory, confession of personality defects, restitution to those harmed, helpfulness to others, and the necessity of belief in and dependence upon God.</span></p><p class="mb-2">Prior to his journey to Akron, <span class="ann ann-solution" data-id="f2-solution-1" onclick="showAnn(this)">the broker had worked hard with many alcoholics on the theory that only an alcoholic could help an alcoholic, but he had succeeded only in keeping sober himself.</span> The broker had gone to Akron on a business venture which had collapsed, leaving him greatly in fear that he might start drinking again. <span class="ann ann-historical" data-id="f2-hist-4" onclick="showAnn(this)">He suddenly realized that in order to save himself he must carry his message to another alcoholic. That alcoholic turned out to be the Akron physician.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xvii</div><p class="mb-2">This physician had repeatedly tried spiritual means to resolve his alcoholic dilemma but had failed. But <span class="ann ann-medical" data-id="f2-medical-3" onclick="showAnn(this)">when the broker gave him Dr. Silkworth's description of alcoholism and its hopelessness, the physician began to pursue the spiritual remedy for his malady with a willingness he had never before been able to muster.</span> He sobered, never to drink again up to the moment of his death in 1950. <span class="ann ann-solution" data-id="f2-solution-2" onclick="showAnn(this)">This seemed to prove that one alcoholic could affect another as no nonalcoholic could. It also indicated that strenuous work, one alcoholic with another, was vital to permanent recovery.</span></p><p class="mb-2"><span class="ann ann-historical" data-id="f2-hist-5" onclick="showAnn(this)">Hence the two men set to work almost frantically upon alcoholics arriving in the ward of the Akron City Hospital. Their very first case, a desperate one, recovered immediately and became A.A. number three. He never had another drink.</span> This work at Akron continued through the summer of 1935. There were many failures, but there was an occasional heartening success. <span class="ann ann-fellowship" data-id="f2-fellowship-1" onclick="showAnn(this)">When the broker returned to New York in the fall of 1935, the first A.A. group had actually been formed, though no one realized it at the time.</span></p><p class="mb-2">A second small group promptly took shape at New York, to be followed in 1937 with the start of a third at Cleveland. Besides these, there were scattered alcoholics who had picked up the basic ideas in Akron or New York who were trying to form groups in other cities. By late 1937, the number of members having substantial sobriety time behind them was sufficient to convince the membership that <span class="ann ann-key" data-id="f2-key-2" onclick="showAnn(this)">a new light had entered the dark world of the alcoholic.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xviii</div><p class="mb-2"><span class="ann ann-historical" data-id="f2-hist-6" onclick="showAnn(this)">It was now time, the struggling groups thought, to place their message and unique experience before the world. This determination bore fruit in the spring of 1939 by the publication of this volume. The membership had then reached about 100 men and women.</span> <span class="ann ann-literary" data-id="f2-literary-1" onclick="showAnn(this)">The fledgling society, which had been nameless, now began to be called Alcoholics Anonymous, from the title of its own book. The flying-blind period ended and A.A. entered a new phase of its pioneering time.</span></p><p class="mb-2">With the appearance of the new book a great deal began to happen. <span class="ann ann-historical" data-id="f2-hist-7" onclick="showAnn(this)">Dr. Harry Emerson Fosdick, the noted clergyman, reviewed it with approval. In the fall of 1939 Fulton Oursler, then editor of Liberty, printed a piece in his magazine, called "Alcoholics and God." This brought a rush of 800 frantic inquiries into the little New York office which meanwhile had been established.</span> Each inquiry was painstakingly answered; pamphlets and books were sent out. Businessmen, traveling out of existing groups, were referred to these prospective newcomers. New groups started up and it was found, to the astonishment of everyone, that A.A.'s message could be transmitted in the mail as well as by word of mouth. By the end of 1939 it was estimated that 800 alcoholics were on their way to recovery.</p><p class="mb-2"><span class="ann ann-historical" data-id="f2-hist-8" onclick="showAnn(this)">In the spring of 1940, John D. Rockefeller, Jr. gave a dinner for many of his friends to which he invited A.A. members to tell their stories. News of this got on the world wires; inquiries poured in again and many people went to the bookstores to get the book "Alcoholics Anonymous."</span> <span class="ann ann-progression" data-id="f2-progression-2" onclick="showAnn(this)">By March 1941 the membership had shot up to 2,000.</span> Then <span class="ann ann-historical" data-id="f2-hist-9" onclick="showAnn(this)">Jack Alexander wrote a feature article in the Saturday Evening Post and placed such a compelling picture of A.A. before the general public that alcoholics in need of help really deluged us.</span> <span class="ann ann-progression" data-id="f2-progression-2" onclick="showAnn(this)">By the close of 1941, A.A. numbered 8,000 members. The mushrooming process was in full swing. A.A. had become a national institution.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xix</div><p class="mb-2"><span class="ann ann-tradition" data-id="f2-tradition-1" onclick="showAnn(this)">Our Society then entered a fearsome and exciting adolescent period. The test that it faced was this: Could these large numbers of erstwhile erratic alcoholics successfully meet and work together? Would there be quarrels over membership, leadership, and money? Would there be strivings for power and prestige? Would there be schisms which would split A.A. apart? Soon A.A. was beset by these very problems on every side and in every group.</span> <span class="ann ann-fellowship" data-id="f2-fellowship-2" onclick="showAnn(this)">But out of this frightening and at first disrupting experience the conviction grew that A.A.'s had to hang together or die separately. We had to unify our Fellowship or pass off the scene.</span></p><p class="mb-2"><span class="ann ann-tradition" data-id="f2-tradition-2" onclick="showAnn(this)">As we discovered the principles by which the individual alcoholic could live, so we had to evolve principles by which the A.A. groups and A.A. as a whole could survive and function effectively. It was thought that no alcoholic man or woman could be excluded from our Society; that our leaders might serve but never govern; that each group was to be autonomous and there was to be no professional class of therapy. There were to be no fees or dues; our expenses were to be met by our own voluntary contributions. There was to be the least possible organization, even in our service centers. Our public relations were to be based upon attraction rather than promotion. It was decided that all members ought to be anonymous at the level of press, radio, TV and films. And in no circumstances should we give endorsements, make alliances, or enter public controversies.</span></p><p class="mb-2"><span class="ann ann-tradition" data-id="f2-tradition-3" onclick="showAnn(this)">This was the substance of A.A.'s Twelve Traditions, which are stated in full on page 561 of this book. Though none of these principles had the force of rules or laws, they had become so widely accepted by 1950 that they were confirmed by our first International Conference held at Cleveland.</span> <span class="ann ann-fellowship" data-id="f2-fellowship-3" onclick="showAnn(this)">Today the remarkable unity of A.A. is one of the greatest assets that our Society has.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xx</div><p class="mb-2">While the internal difficulties of our adolescent period were being ironed out, public acceptance of A.A. grew by leaps and bounds. For this there were two principal reasons: the large numbers of recoveries, and reunited homes. These made their impressions everywhere. <span class="ann ann-recovery" data-id="f2-recovery-1" onclick="showAnn(this)">Of alcoholics who came to A.A. and really tried, 50% got sober at once and remained that way; 25% sobered up after some relapses, and among the remainder, those who stayed on with A.A. showed improvement. Other thousands came to a few A.A. meetings and at first decided they didn't want the program. But great numbers of these—about two out of three—began to return as time passed.</span></p><p class="mb-2"><span class="ann ann-medical" data-id="f2-medical-2" onclick="showAnn(this)">Another reason for the wide acceptance of A.A. was the ministration of friends—friends in medicine, religion, and the press, together with innumerable others who became our able and persistent advocates.</span> Without such support, A.A. could have made only the slowest progress. Some of the recommendations of A.A.'s early medical and religious friends will be found further on in this book.</p><p class="mb-2"><span class="ann ann-spiritual" data-id="f2-spiritual-2" onclick="showAnn(this)">Alcoholics Anonymous is not a religious organization. Neither does A.A. take any particular medical point of view, though we cooperate widely with the men of medicine as well as with the men of religion.</span></p><p class="mb-2">Alcohol being no respecter of persons, <span class="ann ann-fellowship" data-id="f2-fellowship-4" onclick="showAnn(this)">we are an accurate cross section of America, and in distant lands, the same democratic evening-up process is now going on. By personal religious affiliation, we include Catholics, Protestants, Jews, Hindus, and a sprinkling of Moslems and Buddhists.</span> More than 15% of us are women.</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxi</div><p class="mb-2">At present, <span class="ann ann-foreshadow" data-id="f2-foreshadow-1" onclick="showAnn(this)">our membership is pyramiding at the rate of about twenty per cent a year.</span> So far, <span class="ann ann-key" data-id="f2-key-3" onclick="showAnn(this)">upon the total problem of several million actual and potential alcoholics in the world, we have made only a scratch. In all probability, we shall never be able to touch more than a fair fraction of the alcohol problem in all its ramifications. Upon therapy for the alcoholic himself, we surely have no monopoly.</span> <span class="ann ann-key" data-id="f2-key-4" onclick="showAnn(this)">Yet it is our great hope that all those who have as yet found no answer may begin to find one in the pages of this book and will presently join us on the high road to a new freedom.</span></p>`;

C['foreword-3rd']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xxii</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider">Foreword to Third Edition</h2><p class="mb-2"><span class="ann ann-progression" data-id="f3-progression-1" onclick="showAnn(this)">BY March 1976, when this edition went to the printer, the total worldwide membership of Alcoholics Anonymous was conservatively estimated at more than 1,000,000, with almost 28,000 groups meeting in over 90 countries.</span></p><p class="mb-2">Surveys of groups in the United States and Canada indicate that A.A. is reaching out, not only to more and more people, but to a wider and wider range. <span class="ann ann-fellowship" data-id="f3-fellowship-1" onclick="showAnn(this)">Women now make up more than one-fourth of the membership; among newer members, the proportion is nearly one-third. Seven percent of the A.A.'s surveyed are less than 30 years of age—among them, many in their teens.</span></p><p class="mb-2"><span class="ann ann-key" data-id="f3-key-1" onclick="showAnn(this)">The basic principles of the A.A. program, it appears, hold good for individuals with many different lifestyles, just as the program has brought recovery to those of many different nationalities.</span> <span class="ann ann-literary" data-id="f3-literary-1" onclick="showAnn(this)">The Twelve Steps that summarize the program may be called <em>los Doce Pasos</em> in one country, <em>les Douze Etapes</em> in another, but they trace exactly the same path to recovery that was blazed by the earliest members of Alcoholics Anonymous.</span></p><p class="mb-2"><span class="ann ann-key" data-id="f3-key-2" onclick="showAnn(this)">In spite of the great increase in the size and the span of this Fellowship, at its core it remains simple and personal.</span> <span class="ann ann-solution" data-id="f3-solution-1" onclick="showAnn(this)">Each day, somewhere in the world, recovery begins when one alcoholic talks with another alcoholic, sharing experience, strength, and hope.</span></p>`;

C['foreword-4th']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xxiii</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider">Foreword to Fourth Edition</h2><p class="mb-2"><span class="ann ann-progression" data-id="f4-progression-1" onclick="showAnn(this)">THIS fourth edition of "Alcoholics Anonymous" came off press in November 2001, at the start of a new millennium. Since the third edition was published in 1976, worldwide membership of A.A. has just about doubled, to an estimated two million or more, with nearly 100,800 groups meeting in approximately 150 countries around the world.</span></p><p class="mb-2"><span class="ann ann-literary" data-id="f4-literary-1" onclick="showAnn(this)">Literature has played a major role in A.A.'s growth, and a striking phenomenon of the past quarter-century has been the explosion of translations of our basic literature into many languages and dialects. In country after country where the A.A. seed was planted, it has taken root, slowly at first, then growing by leaps and bounds when literature has become available. Currently, "Alcoholics Anonymous" has been translated into forty-three* languages.</span></p><p class="mb-2"><span class="ann ann-key" data-id="f4-key-1" onclick="showAnn(this)">As the message of recovery has reached larger numbers of people, it has also touched the lives of a vastly greater variety of suffering alcoholics. When the phrase "We are people who normally would not mix" (page 17 of this book) was written in 1939, it referred to a Fellowship composed largely of men (and a few women) with quite similar social, ethnic, and economic backgrounds. Like so much of A.A.'s basic text, those words have proved to be far more visionary than the founding members could ever have imagined.</span> <span class="ann ann-fellowship" data-id="f4-fellowship-1" onclick="showAnn(this)">The stories added to this edition represent a membership whose characteristics—of age, gender, race, and culture—have widened and have deepened to encompass virtually everyone the first 100 members could have hoped to reach.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxiv</div><p class="mb-2">While our literature has preserved the integrity of the A.A. message, sweeping changes in society as a whole are reflected in new customs and practices within the Fellowship. Taking advantage of technological advances, for example, <span class="ann ann-historical" data-id="f4-hist-1" onclick="showAnn(this)">A.A. members with computers can participate in meetings online, sharing with fellow alcoholics across the country or around the world.</span> In any meeting, anywhere, A.A.'s share experience, strength, and hope with each other, in order to stay sober and help other alcoholics. <span class="ann ann-key" data-id="f4-key-2" onclick="showAnn(this)">Modem-to-modem or face-to-face, A.A.'s speak the language of the heart in all its power and simplicity.</span></p><p class="text-2xs text-gray-400 dark:text-gray-500 mt-3 italic">*In 2013, Alcoholics Anonymous is in seventy languages.</p>`;

C['doctors-opinion']=`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page xxv</div><h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider">The Doctor's Opinion</h2><p class="mb-2">WE OF Alcoholics Anonymous believe that the reader will be interested in the medical estimate of the plan of recovery described in this book. Convincing testimony must surely come from medical men who have had experience with the sufferings of our members and have witnessed our return to health. A well-known doctor, chief physician at a nationally prominent hospital specializing in alcoholic and drug addiction, gave Alcoholics Anonymous this letter:</p><p class="mb-2 font-semibold text-2xs text-gray-600 dark:text-gray-400 italic">To Whom It May Concern:</p><p class="mb-2">I have specialized in the treatment of alcoholism for many years.</p><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-1" onclick="showAnn(this)">In late 1934 I attended a patient who, though he had been a competent businessman of good earning capacity, was an alcoholic of a type I had come to regard as hopeless.</span></p><p class="mb-2"><span class="ann ann-solution" data-id="do-solution-1" onclick="showAnn(this)">In the course of his third treatment he acquired certain ideas concerning a possible means of recovery. As part of his rehabilitation he commenced to present his conceptions to other alcoholics, impressing upon them that they must do likewise with still others. This has become the basis of a rapidly growing fellowship of these men and their families. This man and over one hundred others appear to have recovered.</span></p><p class="mb-2"><span class="ann ann-endorsement" data-id="do-endorsement-2" onclick="showAnn(this)">I personally know scores of cases who were of the type with whom other methods had failed completely.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxvi</div><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-10" onclick="showAnn(this)">These facts appear to be of extreme medical importance; because of the extraordinary possibilities of rapid growth inherent in this group they may mark a new epoch in the annals of alcoholism. These men may well have a remedy for thousands of such situations.</span></p><p class="mb-2"><span class="ann ann-endorsement" data-id="do-endorsement-1" onclick="showAnn(this)">You may rely absolutely on anything they say about themselves.</span></p><p class="text-right font-semibold text-2xs text-gray-500 dark:text-gray-400 mb-1 italic">Very truly yours,</p><p class="text-right font-semibold text-2xs text-gray-500 dark:text-gray-400 mb-3 italic">William D. Silkworth, M.D.</p><p class="mb-2">The physician who, at our request, gave us this letter, has been kind enough to enlarge upon his views in another statement which follows. In this statement he confirms what we who have suffered alcoholic torture must believe—<span class="ann ann-medical" data-id="do-medical-2" onclick="showAnn(this)">that the body of the alcoholic is quite as abnormal as his mind.</span> It did not satisfy us to be told that we could not control our drinking just because we were maladjusted to life, that we were in full flight from reality, or were outright mental defectives. These things were true to some extent, in fact, to a considerable extent with some of us. But we are sure that our bodies were sickened as well. In our belief, any picture of the alcoholic which leaves out this physical factor is incomplete.</p><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-3" onclick="showAnn(this)">The doctor's theory that we have an allergy to alcohol interests us.</span> As laymen, our opinion as to its soundness may, of course, mean little. But as ex-problem drinkers, we can say that his explanation makes good sense. It explains many things for which we cannot otherwise account.</p><p class="mb-2">Though we work out our solution on the spiritual as well as an altruistic plane, <span class="ann ann-medical" data-id="do-medical-4" onclick="showAnn(this)">we favor hospitalization for the alcoholic who is very jittery or befogged. More often than not, it is imperative that a man's brain be cleared before he is approached,</span> as he has then a better chance of understanding and accepting what we have to offer.</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxvii</div><p class="mb-2 font-semibold text-2xs text-gray-600 dark:text-gray-400 italic">The doctor writes:</p><p class="mb-2">The subject presented in this book seems to me to be of paramount importance to those afflicted with alcoholic addiction.</p><p class="mb-2">I say this after many years' experience as Medical Director of one of the oldest hospitals in the country treating alcoholic and drug addiction.</p><p class="mb-2">There was, therefore, a sense of real satisfaction when I was asked to contribute a few words on a subject which is covered in such masterly detail in these pages.</p><p class="mb-2"><span class="ann ann-psychological" data-id="do-psychological-1" onclick="showAnn(this)">We doctors have realized for a long time that some form of moral psychology was of urgent importance to alcoholics, but its application presented difficulties beyond our conception. What with our ultra-modern standards, our scientific approach to everything, we are perhaps not well equipped to apply the powers of good that lie outside our synthetic knowledge.</span></p><p class="mb-2"><span class="ann ann-historical" data-id="do-historical-1" onclick="showAnn(this)">Many years ago one of the leading contributors to this book came under our care in this hospital and while here he acquired some ideas which he put into practical application at once.</span></p><p class="mb-2">Later, he requested the privilege of being allowed to tell his story to other patients here and with some misgiving, we consented. The cases we have followed through have been most interesting; in fact, many of them are amazing. <span class="ann ann-key" data-id="do-key-1" onclick="showAnn(this)">The unselfishness of these men as we have come to know them, the entire absence of profit motive, and their community spirit, is indeed inspiring to one who has labored long and wearily in this alcoholic field.</span> <span class="ann ann-spiritual" data-id="do-spiritual-1" onclick="showAnn(this)">They believe in themselves, and still more in the Power which pulls chronic alcoholics back from the gates of death.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxviii</div><p class="mb-2">Of course an alcoholic ought to be freed from his physical craving for liquor, and this often requires a definite hospital procedure, before psychological measures can be of maximum benefit.</p><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-5" onclick="showAnn(this)">We believe, and so suggested a few years ago, that the action of alcohol on these chronic alcoholics is a manifestation of an allergy; that the phenomenon of craving is limited to this class and never occurs in the average temperate drinker. These allergic types can never safely use alcohol in any form at all;</span> and once having formed the habit and found they cannot break it, once having lost their self-confidence, their reliance upon things human, their problems pile up on them and become astonishingly difficult to solve.</p><p class="mb-2"><span class="ann ann-key" data-id="do-key-2" onclick="showAnn(this)">Frothy emotional appeal seldom suffices. The message which can interest and hold these alcoholic people must have depth and weight. In nearly all cases, their ideals must be grounded in a power greater than themselves, if they are to re-create their lives.</span></p><p class="mb-2"><span class="ann ann-emotional" data-id="do-emotional-1" onclick="showAnn(this)">If any feel that as psychiatrists directing a hospital for alcoholics we appear somewhat sentimental, let them stand with us a while on the firing line, see the tragedies, the despairing wives, the little children; let the solving of these problems become a part of their daily work, and even of their sleeping moments, and the most cynical will not wonder that we have accepted and encouraged this movement.</span> We feel, after many years of experience, that we have found nothing which has contributed more to the rehabilitation of these men than the altruistic movement now growing up among them.</p><p class="mb-2"><span class="ann ann-psychological" data-id="do-psychological-2" onclick="showAnn(this)">Men and women drink essentially because they like the effect produced by alcohol. The sensation is so elusive that, while they admit it is injurious, they cannot after a time differentiate the true from the false. To them, their alcoholic life seems the only normal one.</span> <span class="ann ann-medical" data-id="do-medical-6" onclick="showAnn(this)">They are restless, irritable and discontented, unless they can again experience the sense of ease and comfort which comes at once by taking a few drinks—drinks which they see others taking with impunity.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxix</div><p class="mb-2">After they have succumbed to the desire again, as so many do, and the phenomenon of craving develops, they pass through the well-known stages of a spree, emerging remorseful, with a firm resolution not to drink again. This is repeated over and over, and <span class="ann ann-medical" data-id="do-medical-7" onclick="showAnn(this)">unless this person can experience an entire psychic change there is very little hope of his recovery.</span></p><p class="mb-2"><span class="ann ann-key" data-id="do-key-3" onclick="showAnn(this)">On the other hand—and strange as this may seem to those who do not understand—once a psychic change has occurred, the very same person who seemed doomed, who had so many problems he despaired of ever solving them, suddenly finds himself easily able to control his desire for alcohol, the only effort necessary being that required to follow a few simple rules.</span></p><p class="mb-2"><span class="ann ann-emotional" data-id="do-emotional-2" onclick="showAnn(this)">Men have cried out to me in sincere and despairing appeal: "Doctor, I cannot go on like this! I have everything to live for! I must stop, but I cannot! You must help me!"</span></p><p class="mb-2"><span class="ann ann-spiritual" data-id="do-spiritual-2" onclick="showAnn(this)">Faced with this problem, if a doctor is honest with himself, he must sometimes feel his own inadequacy. Although he gives all that is in him, it often is not enough. One feels that something more than human power is needed to produce the essential psychic change.</span> Though the aggregate of recoveries resulting from psychiatric effort is considerable, we physicians must admit we have made little impression upon the problem as a whole. Many types do not respond to the ordinary psychological approach.</p><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-8" onclick="showAnn(this)">I do not hold with those who believe that alcoholism is entirely a problem of mental control. I have had many men who had, for example, worked a period of months on some problem or business deal which was to be settled on a certain date, favorably to them. They took a drink a day or so prior to the date, and then the phenomenon of craving at once became paramount to all other interests so that the important appointment was not met. These men were not drinking to escape; they were drinking to overcome a craving beyond their mental control.</span></p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxx</div><p class="mb-2"><span class="ann ann-warning" data-id="do-warning-1" onclick="showAnn(this)">There are many situations which arise out of the phenomenon of craving which cause men to make the supreme sacrifice rather than continue to fight.</span></p><p class="mb-2"><span class="ann ann-duality" data-id="do-duality-1" onclick="showAnn(this)">The classification of alcoholics seems most difficult, and in much detail is outside the scope of this book. There are, of course, the psychopaths who are emotionally unstable. We are all familiar with this type. They are always "going on the wagon for keeps." They are over-remorseful and make many resolutions, but never a decision.</span></p><p class="mb-2"><span class="ann ann-duality" data-id="do-duality-1" onclick="showAnn(this)">There is the type of man who is unwilling to admit that he cannot take a drink. He plans various ways of drinking. He changes his brand or his environment. There is the type who always believes that after being entirely free from alcohol for a period of time he can take a drink without danger. There is the manic-depressive type, who is, perhaps, the least understood by his friends, and about whom a whole chapter could be written.</span></p><p class="mb-2"><span class="ann ann-key" data-id="do-key-5" onclick="showAnn(this)">Then there are types entirely normal in every respect except in the effect alcohol has upon them. They are often able, intelligent, friendly people.</span></p><p class="mb-2"><span class="ann ann-medical" data-id="do-medical-9" onclick="showAnn(this)">All these, and many others, have one symptom in common: they cannot start drinking without developing the phenomenon of craving. This phenomenon, as we have suggested, may be the manifestation of an allergy which differentiates these people, and sets them apart as a distinct entity. It has never been, by any treatment with which we are familiar, permanently eradicated. The only relief we have to suggest is entire abstinence.</span></p><p class="mb-2">This immediately precipitates us into a seething caldron of debate. Much has been written pro and con, but among physicians, the general opinion seems to be that most chronic alcoholics are doomed.</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxxi</div><p class="mb-2">What is the solution? Perhaps I can best answer this by relating one of my experiences.</p><p class="mb-2"><span class="ann ann-progression" data-id="do-progression-1" onclick="showAnn(this)">About one year prior to this experience a man was brought in to be treated for chronic alcoholism. He had but partially recovered from a gastric hemorrhage and seemed to be a case of pathological mental deterioration. He had lost everything worthwhile in life and was only living, one might say, to drink. He frankly admitted and believed that for him there was no hope. Following the elimination of alcohol, there was found to be no permanent brain injury.</span> <span class="ann ann-recovery" data-id="do-recovery-1" onclick="showAnn(this)">He accepted the plan outlined in this book. One year later he called to see me, and I experienced a very strange sensation. I knew the man by name, and partly recognized his features, but there all resemblance ended. From a trembling, despairing, nervous wreck, had emerged a man brimming over with self-reliance and contentment. I talked with him for some time, but was not able to bring myself to feel that I had known him before. To me he was a stranger, and so he left me. A long time has passed with no return to alcohol.</span></p><p class="mb-2">When I need a mental uplift, I often think of another case brought in by a physician prominent in New York. <span class="ann ann-recovery" data-id="do-recovery-2" onclick="showAnn(this)">The patient had made his own diagnosis, and deciding his situation hopeless, had hidden in a deserted barn determined to die. He was rescued by a searching party, and, in desperate condition, brought to me. Following his physical rehabilitation, he had a talk with me in which he frankly stated he thought the treatment a waste of effort, unless I could assure him, which no one ever had, that in the future he would have the "will power" to resist the impulse to drink.</span></p><p class="mb-2">His alcoholic problem was so complex, and his depression so great, that we felt his only hope would be through what we then called "moral psychology," and we doubted if even that would have any effect.</p><div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 my-1.5 uppercase tracking-widest">Page xxxii</div><p class="mb-2"><span class="ann ann-recovery" data-id="do-recovery-2" onclick="showAnn(this)">However, he did become "sold" on the ideas contained in this book. He has not had a drink for a great many years. I see him now and then and he is as fine a specimen of manhood as one could wish to meet.</span></p><p class="mb-2"><span class="ann ann-key" data-id="do-key-4" onclick="showAnn(this)">I earnestly advise every alcoholic to read this book through, and though perhaps he came to scoff, he may remain to pray.</span></p><p class="text-right font-semibold text-2xs text-gray-500 dark:text-gray-400 mt-3 italic">William D. Silkworth, M.D.</p>`;

see Allergy','Power — 45*, 50*, 59, 62-63, 68','Powerless — 45*, 59','Prayer — 59, 63, 67-68, 70, 75-76, 80, 82, 85-88','Promises — 83-84','R','Recovered — xiii, 17, 20, 29*, 132*','Recovery program — xi, 58-88','Relapse — 31*, 34-36*, 72*','Resentment — 64-66, 552','S','Sanity — 37*, 39*, 60*','Self-centeredness — 62','Selfishness — 62, 69*, 84','Service — 14-15*, 20*, 59, 62*, 76*, 89-103','Sex — 68-70, 80, 82','Silkworth, Dr. — xi, xxv-xxxii','Solution — 17-29, 25*, 28*, 44-57, 58-71','Spiritual awakening — 25*, 567-568','Steps, Twelve — 59-60, 71','Surrender — 30*, 43*, 59*, 164*','T','Tolerance — 19*, 67*, 70*, 83*, 84*, 118*','Traditions, Twelve — 561-563','Twelve Concepts — 575','Twelve Steps — 59-60','Twelve Traditions — 561-563','W','We Agnostics — 44-57','Willingness — 46*, 58*, 63*, 76','Willpower — 22*, 24*, 30*, 34*','Wives — 104-121','Working with others — 89-103','Z','Zeal — 89*'].map(e=>/^[A-Z]$/.test(e)?`<div class="font-bold text-indigo-600 dark:text-indigo-400 text-xs mt-1.5 mb-0.5">${e}</div>`:`<div>${e}</div>`).join('')}</div>`;

function placeholder(id){const s=S.find(x=>x.id===id);if(!s)return'';return`${s.page?`<div class="text-2xs font-sans font-semibold text-indigo-600 dark:text-indigo-400 mb-1.5 uppercase tracking-widest">Page ${s.page}</div>`:''}<h2 class="text-xs font-bold font-sans text-center text-gray-800 dark:text-gray-200 mb-3 uppercase tracking-wider">${s.title}</h2><div class="border-2 border-dashed border-gray-300 dark:border-gray-700 rounded-lg p-4 text-center"><p class="text-2xs text-gray-400 font-sans mb-1">Content placeholder for <strong>${s.title}</strong></p><p class="text-2xs text-gray-400 font-sans">${s.page?'Starting page '+s.page:''}${s.ch?' &middot; Chapter '+s.ch+' of 11':''}</p><div class="mt-3 space-y-1.5 max-w-sm mx-auto">${'<div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-full"></div><div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-5/6"></div><div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-full"></div><div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-3/4"></div><div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-full"></div><div class="h-1.5 bg-gray-200 dark:bg-gray-800 rounded w-5/6"></div>'}</div></div>`;}
